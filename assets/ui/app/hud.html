<section id="screen-hud" class="screen screen-hud" data-screen-node="hud">
  <div class="hud-cluster hud-cluster--top-left">
    <article id="hud-player-status" class="hud-card hud-card--status">
      <header class="hud-card__header">
        <span class="hud-kicker">FrozenLands</span>
        <strong id="hud-temperature" class="hud-value">-42°C</strong>
      </header>
      <div class="hud-meter" data-kind="body-heat">
        <span class="hud-meter__label">Body heat</span>
        <span class="hud-meter__track"><span id="hud-heat-fill" class="hud-meter__fill" style="width: 72%"></span></span>
      </div>
    </article>
  </div>
  <div class="hud-crosshair" aria-hidden="true"><span></span></div>
</section>
