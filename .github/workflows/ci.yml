name: CI

"on":
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gradle:
    name: Gradle / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle wrapper executable
        run: chmod +x ./gradlew
        shell: bash

      - name: Validate Gradle wrapper
        run: ./gradlew --version --console=plain
        shell: bash

      - name: Validate project indexes
        run: ./gradlew validateProjectIndex --warning-mode all --console=plain --stacktrace
        shell: bash

      - name: Validate assets
        run: ./gradlew :assets:check --warning-mode all --console=plain --stacktrace
        shell: bash

      - name: Compile desktop graph
        run: ./gradlew :desktop:classes --warning-mode all --console=plain --stacktrace
        shell: bash

      - name: Build install distribution
        run: ./gradlew :desktop:installDist --warning-mode all --console=plain --stacktrace
        shell: bash
